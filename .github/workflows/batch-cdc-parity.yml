name: Batch and CDC parity integration

on:
  workflow_dispatch:

jobs:
  batch-cdc-parity:
    name: Batch versus CDC parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OLIST_AIRFLOW_RETRIES: "0"
      OLIST_AIRFLOW_RETRY_DELAY_SECONDS: "1"
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python and locked runtime dependencies
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install project Python and dependencies
        run: |
          uv python install
          uv sync --locked --no-dev

      - name: Prepare writable mounted paths
        run: |
          mkdir -p \
            airflow/logs \
            airflow/plugins \
            data/reports \
            dbt/olist_analytics/logs \
            dbt/olist_analytics/target \
            dbt/olist_analytics/dbt_packages
          chmod -R a+rwX \
            airflow/logs \
            airflow/plugins \
            data \
            dbt/olist_analytics

      - name: Start from a clean Compose state
        run: docker compose --profile batch --profile realtime-core down -v --remove-orphans

      - name: Validate Compose configuration
        run: docker compose --profile batch --profile realtime-core config --quiet

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Build integration images
        run: >-
          docker compose --profile realtime-core build
          airflow kafka-connect minio nifi

      - name: Install dbt packages in mounted workspace
        run: >-
          docker compose run --rm --no-deps airflow
          bash -lc 'cd /opt/airflow/project/dbt/olist_analytics && dbt deps'

      - name: Start batch and realtime-core stack
        run: docker compose --profile batch --profile realtime-core up -d --wait

      - name: Verify Airflow DAG imports
        run: >-
          docker compose exec -T airflow
          python scripts/ci/check_airflow_dag_imports.py

      - name: Run bounded batch-versus-CDC parity test
        run: >-
          docker compose exec -T airflow
          python scripts/ci/check_batch_cdc_parity_integration.py
          --timeout-seconds 1200
          --poll-seconds 2
          --report data/reports/batch-cdc-parity.json

      - name: Ensure a bounded report exists
        if: always()
        run: >-
          uv run python -c "from pathlib import Path; import json; p=Path('data/reports/batch-cdc-parity.json');
          p.exists() or p.write_text(json.dumps({'status':'FAIL','failure':'parity orchestrator did not produce a report'})+'\n')"

      - name: Upload bounded parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-cdc-parity-report
          path: data/reports/batch-cdc-parity.json
          if-no-files-found: warn

      - name: Dump bounded integration logs
        if: failure()
        run: >-
          docker compose --profile realtime-core logs --no-color --tail=500
          airflow postgres airflow-postgres oltp-postgres kafka apicurio-registry
          kafka-connect minio nifi cdc-warehouse-init nifi-bootstrap

      - name: Clean up Compose resources
        if: always()
        run: docker compose --profile batch --profile realtime-core down -v --remove-orphans
