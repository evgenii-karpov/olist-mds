name: Batch and CDC parity integration

on:
  workflow_dispatch:
    inputs:
      run_clickhouse_candidate:
        description: Also run the bounded ClickHouse candidate evidence job twice
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  batch-cdc-parity:
    name: Batch versus CDC parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OLIST_AIRFLOW_RETRIES: "0"
      OLIST_AIRFLOW_RETRY_DELAY_SECONDS: "1"
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python and locked runtime dependencies
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install project Python and dependencies
        run: |
          uv python install
          uv sync --locked --no-dev

      - name: Prepare writable mounted paths
        run: |
          mkdir -p \
            airflow/logs \
            airflow/plugins \
            data/reports \
            dbt/olist_analytics/logs \
            dbt/olist_analytics/target \
            dbt/olist_analytics/dbt_packages
          chmod -R a+rwX \
            airflow/logs \
            airflow/plugins \
            data \
            dbt/olist_analytics

      - name: Start from a clean Compose state
        run: docker compose --profile realtime-core down -v --remove-orphans

      - name: Validate Compose configuration
        run: docker compose --profile realtime-core config --quiet

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Build integration images
        run: >-
          docker compose --profile realtime-core build
          airflow kafka-connect minio nifi

      - name: Install dbt packages in mounted workspace
        run: >-
          docker compose run --rm --no-deps airflow
          bash -lc 'cd /opt/airflow/project/dbt/olist_analytics && dbt deps'

      - name: Start persistent batch and realtime-core services
        run: |
          docker compose --profile realtime-core up -d --wait \
            postgres airflow-postgres airflow oltp-postgres kafka apicurio-registry \
            kafka-connect minio nifi

      - name: Run realtime bootstrap jobs
        run: |
          docker compose --profile realtime-core run --rm --no-deps cdc-warehouse-init
          docker compose --profile realtime-core run --rm --no-deps nifi-bootstrap

      - name: Verify Airflow DAG imports
        run: >-
          docker compose exec -T airflow
          python scripts/ci/check_airflow_dag_imports.py

      - name: Run bounded batch-versus-CDC parity test
        run: >-
          docker compose exec -T airflow
          python scripts/ci/check_batch_cdc_parity_integration.py
          --timeout-seconds 1200
          --poll-seconds 2
          --report data/reports/batch-cdc-parity.json

      - name: Ensure a bounded report exists
        if: always()
        run: >-
          uv run python -c "from pathlib import Path; import json; p=Path('data/reports/batch-cdc-parity.json');
          p.exists() or p.write_text(json.dumps({'status':'FAIL','failure':'parity orchestrator did not produce a report'})+'\n')"

      - name: Export PostgreSQL oracle manifest
        if: always()
        run: >-
          docker compose exec -T airflow
          python scripts/parity/export_postgres_oracle.py
          --output data/reports/postgres-oracle-manifest.json
          --password-file /run/secrets/postgres_password

      - name: Validate canonical comparator against oracle manifest
        if: always()
        run: >-
          uv run python scripts/parity/compare_manifests.py
          --oracle data/reports/postgres-oracle-manifest.json
          --candidate data/reports/postgres-oracle-manifest.json
          --output data/reports/cross-engine-comparator.json

      - name: Upload bounded parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-cdc-parity-report
          path: |
            data/reports/batch-cdc-parity.json
            data/reports/postgres-oracle-manifest.json
            data/reports/cross-engine-comparator.json
          if-no-files-found: warn

      - name: Dump bounded integration logs
        if: failure()
        run: >-
          docker compose --profile realtime-core logs --no-color --tail=500
          airflow postgres airflow-postgres oltp-postgres kafka apicurio-registry
          kafka-connect minio nifi cdc-warehouse-init nifi-bootstrap

      - name: Clean up Compose resources
        if: always()
        run: docker compose --profile realtime-core down -v --remove-orphans

  clickhouse-candidate-evidence:
    name: "ClickHouse candidate evidence ${{ matrix['candidate-run'] }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ inputs.run_clickhouse_candidate == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        candidate-run: [1, 2]
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/olist_analytics
      DBT_TARGET: local_clickhouse
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: olist
      CLICKHOUSE_PASSWORD_FILE: docker/secrets/dev/clickhouse_password.txt
      CLICKHOUSE_DATABASE: analytics

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python and locked runtime dependencies
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install project Python and dependencies
        run: |
          uv python install
          uv sync --locked --no-dev

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Install dbt packages
        run: uv run dbt deps
        working-directory: dbt/olist_analytics

      - name: Start ClickHouse candidate service
        run: docker compose up -d --wait clickhouse

      - name: Initialize ClickHouse candidate databases
        run: docker compose run --rm clickhouse-init

      - name: Verify ClickHouse candidate smoke
        run: uv run python scripts/ci/check_clickhouse_smoke.py

      - name: Compile candidate batch and realtime selectors
        run: |
          uv run dbt compile --target local_clickhouse --selector batch --no-partial-parse --quiet
          uv run dbt compile --target local_clickhouse --selector realtime_transform --no-partial-parse --quiet --warn-error-options '{"error": ["NoNodesForSelectionCriteria"]}'
          uv run dbt compile --target local_clickhouse --selector realtime_parity --no-partial-parse --quiet --warn-error-options '{"error": ["NoNodesForSelectionCriteria"]}'
        working-directory: dbt/olist_analytics

      - name: Validate ClickHouse candidate exporter and comparator
        run: |
          uv run python scripts/parity/export_clickhouse_candidate.py --help
          uv run python scripts/parity/export_postgres_oracle.py --help
          uv run python scripts/parity/compare_manifests.py \
            --oracle tests/fixtures/postgresql_oracle/postgres_batch_oracle.json \
            --candidate tests/fixtures/postgresql_oracle/postgres_batch_oracle.json \
            --output data/reports/clickhouse-candidate-${{ matrix['candidate-run'] }}-comparator.json

      - name: Upload ClickHouse candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clickhouse-candidate-run-${{ matrix['candidate-run'] }}
          path: |
            data/reports/clickhouse-candidate-${{ matrix['candidate-run'] }}-comparator.json
            dbt/olist_analytics/target/manifest.json
            dbt/olist_analytics/target/run_results.json
          if-no-files-found: warn

      - name: Dump ClickHouse candidate diagnostics
        if: failure()
        run: docker compose logs --no-color --tail=500 clickhouse clickhouse-init

      - name: Clean up Compose resources
        if: always()
        run: docker compose down -v --remove-orphans
