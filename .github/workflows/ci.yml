name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  static-analysis:
    name: Lint, type check, and dbt static validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: olist_analytics
          POSTGRES_USER: olist
          POSTGRES_PASSWORD: olist
          PGDATA: /var/lib/postgresql/18/docker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U olist -d olist_analytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/olist_analytics
      DBT_TARGET: local_pg
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: olist_analytics
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install quality dependencies
        run: uv sync --locked --group quality

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Validate dbt profiles for dbt and Elementary
        run: >-
          uv run python -c "import yaml;
          profiles = yaml.safe_load(open('profiles.yml'));
          assert 'olist_analytics' in profiles;
          assert 'elementary' in profiles"
        working-directory: dbt/olist_analytics

      - name: Install dbt packages
        run: uv run dbt deps
        working-directory: dbt/olist_analytics

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Check Ruff formatting
        run: uv run ruff format --check .

      - name: Run Pyright
        run: uv run pyright

      - name: Parse dbt project
        run: uv run dbt parse --no-partial-parse --show-all-deprecations
        working-directory: dbt/olist_analytics

      - name: Compile dbt project
        run: uv run dbt compile --no-partial-parse
        working-directory: dbt/olist_analytics

      - name: Verify dbt selector boundaries
        run: uv run python scripts/ci/check_dbt_selector_boundaries.py

      - name: Lint SQL with SQLFluff
        run: >-
          uv run sqlfluff lint
          dbt/olist_analytics/models
          dbt/olist_analytics/snapshots
          dbt/olist_analytics/tests
          dbt/olist_analytics/analyses
          dbt/olist_analytics/macros

  python-unit:
    name: Python unit and fixture contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --no-dev

      - name: Compile Python modules
        run: uv run python -m compileall airflow/dags scripts tests

      - name: Validate realtime configuration scaffolding
        run: uv run python scripts/ci/validate_realtime_configuration.py

      - name: Validate Phase 6 observability and recovery configuration
        run: uv run python scripts/ci/validate_stage6_configuration.py

      - name: Validate NiFi flow and CDC schemas
        run: uv run python scripts/ci/validate_nifi_flow.py

      - name: Check Avro schema compatibility
        run: uv run python scripts/ci/check_avro_schema_compatibility.py

      - name: Validate small fixture contract
        run: >-
          uv run python scripts/utilities/validate_source_contract.py
          --archive tests/fixtures/olist_small/olist_small.zip
          --profile tests/fixtures/olist_small/source_profile_small.json

      - name: Run Python unit tests
        run: uv run python -m unittest discover -s tests -v

  airflow-imports:
    name: Docker Compose and Airflow DAG imports
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: |
          docker compose config --quiet
          for profiles in \
            realtime-core \
            observability \
            logs \
            "realtime-core,observability" \
            "realtime-core,observability,logs"; do
            profile_args=()
            IFS=',' read -ra profile_names <<< "$profiles"
            for profile_name in "${profile_names[@]}"; do
              profile_args+=(--profile "$profile_name")
            done
            docker compose "${profile_args[@]}" config --quiet
          done

      - name: Build Airflow image
        run: docker compose build airflow

      - name: Start Airflow metadata database
        run: docker compose up -d airflow-postgres

      - name: Check Airflow DAG import errors
        run: docker compose run --rm --no-deps airflow python scripts/ci/check_airflow_dag_imports.py

      - name: Clean up Compose resources
        if: always()
        run: docker compose down -v

  clickhouse-incremental-edges:
    name: "ClickHouse batch fact insert_overwrite edges"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install Python and runtime dependencies
        run: |
          uv python install
          uv sync --locked --no-dev

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Install dbt packages
        run: uv run dbt deps
        working-directory: dbt/olist_analytics

      - name: Start isolated ClickHouse service
        run: docker compose up -d --wait clickhouse

      - name: Initialize ClickHouse databases
        run: docker compose run --rm clickhouse-init

      - name: Verify ClickHouse incremental fact partition replacement edges
        run: uv run python scripts/ci/check_clickhouse_fact_insert_overwrite_edges.py

      - name: Dump ClickHouse diagnostics
        if: failure()
        run: docker compose logs --no-color --tail=500 clickhouse clickhouse-init

      - name: Clean up Compose resources
        if: always()
        run: docker compose down -v

  clickhouse-candidate-static:
    name: "ClickHouse candidate: dbt compile and comparator contract"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/olist_analytics
      DBT_TARGET: local_clickhouse
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: olist
      CLICKHOUSE_PASSWORD_FILE: docker/secrets/dev/clickhouse_password.txt
      CLICKHOUSE_DATABASE: analytics

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install Python and runtime dependencies
        run: |
          uv python install
          uv sync --locked --no-dev

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Install dbt packages
        run: uv run dbt deps
        working-directory: dbt/olist_analytics

      - name: Start isolated ClickHouse service
        run: docker compose up -d --wait clickhouse

      - name: Initialize ClickHouse databases
        run: docker compose run --rm clickhouse-init

      - name: Verify ClickHouse connection
        run: uv run python scripts/ci/check_clickhouse_smoke.py

      - name: Compile ClickHouse batch selector
        run: >-
          uv run dbt compile --target local_clickhouse --selector batch
          --no-partial-parse --quiet
          --warn-error-options '{"error": ["NoNodesForSelectionCriteria"]}'
        working-directory: dbt/olist_analytics

      - name: Compile ClickHouse realtime transform selector
        run: >-
          uv run dbt compile --target local_clickhouse --selector realtime_transform
          --no-partial-parse --quiet
          --warn-error-options '{"error": ["NoNodesForSelectionCriteria"]}'
        working-directory: dbt/olist_analytics

      - name: Compile ClickHouse realtime parity selector
        run: >-
          uv run dbt compile --target local_clickhouse --selector realtime_parity
          --no-partial-parse --quiet
          --warn-error-options '{"error": ["NoNodesForSelectionCriteria"]}'
        working-directory: dbt/olist_analytics

      - name: Validate canonical comparator contract
        run: >-
          uv run python scripts/parity/compare_manifests.py
          --oracle tests/fixtures/postgresql_oracle/postgres_batch_oracle.json
          --candidate tests/fixtures/postgresql_oracle/postgres_batch_oracle.json
          --output data/reports/clickhouse-comparator-contract.json

      - name: Upload ClickHouse candidate static artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clickhouse-candidate-static
          path: |
            data/reports/clickhouse-comparator-contract.json
            dbt/olist_analytics/target/manifest.json
            dbt/olist_analytics/target/run_results.json
          if-no-files-found: warn

      - name: Dump ClickHouse diagnostics
        if: failure()
        run: docker compose logs --no-color --tail=500 clickhouse clickhouse-init

      - name: Clean up Compose resources
        if: always()
        run: docker compose down -v

  cdc-stage1-oltp-simulator:
    name: "CDC implementation — Stage 1: OLTP simulator"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install runtime dependencies
        run: uv sync --locked --no-dev

      - name: Start isolated OLTP service
        run: docker compose --profile realtime-core up -d --wait oltp-postgres

      - name: Run bounded simulator integration
        run: >-
          uv run python scripts/ci/check_oltp_simulator_integration.py
          --password-file docker/secrets/dev/postgres_password.txt

      - name: Dump OLTP logs
        if: failure()
        run: docker compose --profile realtime-core logs --no-color --tail=500 oltp-postgres

      - name: Clean up Compose resources
        if: always()
        run: docker compose --profile realtime-core down -v

  cdc-stage4-warehouse-ingest:
    name: "CDC implementation — Stage 4: idempotent warehouse ingestion"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true

      - name: Install Python and runtime dependencies
        run: |
          uv python install
          uv sync --locked --no-dev

      - name: Build MinIO and start isolated storage and warehouse
        run: |
          docker compose --profile realtime-core build minio
          docker compose --profile realtime-core up -d --wait postgres minio

      - name: Validate idempotency, gaps, retry, reconciliation, and replay
        run: >-
          uv run python scripts/ci/check_stage4_cdc_integration.py
          --postgres-password-file docker/secrets/dev/postgres_password.txt
          --s3-secret-file docker/secrets/dev/airflow_api_secret_key.txt

      - name: Dump bounded Phase 4 diagnostics
        if: failure()
        run: docker compose --profile realtime-core logs --no-color --tail=500 postgres minio

      - name: Clean up Compose resources
        if: always()
        run: docker compose --profile realtime-core down -v

  cdc-stage5-realtime-dbt:
    name: "CDC implementation — Stage 5: realtime dbt semantics"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: olist_analytics
          POSTGRES_USER: olist
          POSTGRES_PASSWORD: olist
          PGDATA: /var/lib/postgresql/18/docker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U olist -d olist_analytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/olist_analytics
      DBT_TARGET: local_pg
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: olist_analytics
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist
      PYTHONUTF8: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: 0.11.28
          enable-cache: true
      - name: Install Python and runtime dependencies
        run: |
          uv python install
          uv sync --locked --no-dev
      - name: Prepare dbt project
        run: |
          cp profiles.yml.example profiles.yml
          uv run dbt deps
        working-directory: dbt/olist_analytics
      - name: Verify source ordering, history, impact isolation, and hard deletes
        run: uv run python scripts/ci/check_stage5_cdc_integration.py

  batch-fixture-idempotency:
    name: "Batch pipeline: small-fixture idempotency and replay"
    runs-on: ubuntu-latest
    env:
      OLIST_AIRFLOW_RETRIES: "0"
      OLIST_AIRFLOW_RETRY_DELAY_SECONDS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare writable Airflow workspace paths
        run: |
          mkdir -p \
            airflow/logs \
            airflow/plugins \
            data \
            dbt/olist_analytics/logs \
            dbt/olist_analytics/target \
            dbt/olist_analytics/dbt_packages
          chmod -R a+rwX \
            airflow/logs \
            airflow/plugins \
            data \
            dbt/olist_analytics \
            dbt/olist_analytics/logs \
            dbt/olist_analytics/target \
            dbt/olist_analytics/dbt_packages

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build Airflow image
        run: docker compose build airflow

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml
        working-directory: dbt/olist_analytics

      - name: Install dbt packages in mounted workspace
        run: >-
          docker compose run --rm --no-deps airflow
          bash -lc 'cd /opt/airflow/project/dbt/olist_analytics && dbt deps'

      - name: Start Airflow fixture stack
        run: docker compose up -d --wait postgres airflow-postgres airflow

      - name: Check Airflow DAG import errors
        run: >-
          docker compose exec -T airflow
          python scripts/ci/check_airflow_dag_imports.py

      - name: Register Airflow DAGs
        run: docker compose exec -T airflow airflow dags reserialize

      - name: Run small fixture DAG idempotency check
        run: >-
          docker compose exec -T airflow
          python scripts/ci/check_fixture_pipeline_idempotency.py
          --timeout-seconds 600
          --poll-seconds 2

      - name: Dump fixture stack logs
        if: failure()
        run: docker compose logs --no-color --tail=500 airflow postgres airflow-postgres

      - name: Clean up Compose resources
        if: always()
        run: docker compose down -v
