services:
  # These three services intentionally have no profile. This preserves the
  # original `docker compose up` batch-development behavior.
  postgres:
    image: postgres:18.4
    container_name: olist-postgres
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-olist_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    volumes:
      - olist_postgres_data:/var/lib/postgresql
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-olist} -d $${POSTGRES_DB:-olist_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  airflow-postgres:
    image: postgres:17.10
    container_name: olist-airflow-postgres
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD_FILE: /run/secrets/airflow_postgres_password
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    secrets:
      - airflow_postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-airflow} -d $${POSTGRES_DB:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: olist-airflow:local
    container_name: olist-airflow
    restart: unless-stopped
    working_dir: /opt/airflow/project
    depends_on:
      postgres:
        condition: service_healthy
      airflow-postgres:
        condition: service_healthy
    command:
      - bash
      - /opt/airflow/project/docker/airflow/load-env-and-run.sh
      - airflow
      - standalone
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/project/airflow/simple_auth_manager_passwords.json
      OLIST_PROJECT_ROOT: /opt/airflow/project
      OLIST_PYTHON_BIN: python
      OLIST_AIRFLOW_RETRIES: "${OLIST_AIRFLOW_RETRIES:-2}"
      OLIST_AIRFLOW_RETRY_DELAY_SECONDS: "${OLIST_AIRFLOW_RETRY_DELAY_SECONDS:-300}"
      DBT_PROFILES_DIR: /opt/airflow/project/dbt/olist_analytics
      DBT_TARGET: "${DBT_TARGET:-local_pg}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-olist_analytics}"
      POSTGRES_USER: "${POSTGRES_USER:-olist}"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      AIRFLOW_POSTGRES_HOST: airflow-postgres
      AIRFLOW_POSTGRES_PORT: "5432"
      AIRFLOW_POSTGRES_DB: "${AIRFLOW_POSTGRES_DB:-airflow}"
      AIRFLOW_POSTGRES_USER: "${AIRFLOW_POSTGRES_USER:-airflow}"
      AIRFLOW_POSTGRES_PASSWORD_FILE: /run/secrets/airflow_postgres_password
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_CMD: python /opt/airflow/project/scripts/utilities/airflow_config_cmd.py sql_alchemy_conn
      AIRFLOW__API__SECRET_KEY_CMD: python /opt/airflow/project/scripts/utilities/airflow_config_cmd.py api_secret_key
      AIRFLOW__API__SECRET_KEY_FILE: /run/secrets/airflow_api_secret_key
      REDSHIFT_PASSWORD_FILE: /run/secrets/redshift_password
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    secrets:
      - postgres_password
      - airflow_postgres_password
      - airflow_api_secret_key
      - redshift_password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}" || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  oltp-postgres:
    image: postgres:18.4
    profiles: [realtime-core]
    container_name: olist-oltp-postgres
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${OLTP_POSTGRES_DB:-olist_oltp}
      POSTGRES_USER: ${OLTP_POSTGRES_ADMIN_USER:-olist_admin}
      POSTGRES_PASSWORD_FILE: /run/secrets/oltp_admin_password
      PGDATA: /var/lib/postgresql/18/docker
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      - -c
      - max_slot_wal_keep_size=1GB
      - -c
      - wal_keep_size=128MB
    ports:
      - "${OLTP_POSTGRES_PORT:-5433}:5432"
    volumes:
      - olist_oltp_data:/var/lib/postgresql
      - ./infra/oltp/initdb:/docker-entrypoint-initdb.d:ro
    secrets:
      - oltp_admin_password
      - oltp_simulator_password
      - oltp_cdc_reader_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-olist_admin} -d $${POSTGRES_DB:-olist_oltp}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka:
    image: apache/kafka:4.3.1
    profiles: [realtime-core]
    container_name: olist-kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:29093,INTERNAL://:29092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    volumes:
      - olist_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  kafka-topics:
    image: apache/kafka:4.3.1
    profiles: [realtime-core]
    container_name: olist-kafka-topics
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./streaming/kafka/create-topics.sh:/opt/olist/create-topics.sh:ro
    command: ["bash", "/opt/olist/create-topics.sh", "kafka:29092"]

  apicurio-registry:
    image: quay.io/apicurio/apicurio-registry:3.3.0
    profiles: [realtime-core]
    container_name: olist-apicurio-registry
    hostname: apicurio-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics:
        condition: service_completed_successfully
    ports:
      - "${APICURIO_HOST_PORT:-8081}:8080"
    environment:
      APICURIO_STORAGE_KIND: kafkasql
      APICURIO_KAFKASQL_BOOTSTRAP_SERVERS: kafka:29092
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/apis/registry/v3/system/info >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  kafka-connect:
    build:
      context: streaming/connect
      dockerfile: Dockerfile
    image: olist-kafka-connect:3.6.0.Final
    profiles: [realtime-core]
    container_name: olist-kafka-connect
    hostname: kafka-connect
    restart: unless-stopped
    depends_on:
      oltp-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-topics:
        condition: service_completed_successfully
      apicurio-registry:
        condition: service_healthy
    ports:
      - "${KAFKA_CONNECT_HOST_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: olist-connect-cluster
      CONFIG_STORAGE_TOPIC: olist_connect_configs
      OFFSET_STORAGE_TOPIC: olist_connect_offsets
      STATUS_STORAGE_TOPIC: olist_connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      ENABLE_APICURIO_CONVERTERS: "true"
      CONNECT_TOPIC_CREATION_ENABLE: "false"
      REST_ADVERTISED_HOST_NAME: kafka-connect
    secrets:
      - oltp_cdc_reader_password
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8083/connectors >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Phase 0 profile marker. Later phases attach real services to the named
  # profiles. The marker makes every profile selectable and testable now while
  # keeping the default batch stack unchanged.
  cdc-profile-contract:
    image: alpine:3.23.3
    profiles: [batch, realtime-core, observability, logs]
    command: ["/bin/true"]
    restart: "no"

volumes:
  olist_postgres_data:
  airflow_postgres_data:
  olist_oltp_data:
  olist_kafka_data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_SOURCE_FILE:-./docker/secrets/dev/postgres_password.txt}
  airflow_postgres_password:
    file: ${AIRFLOW_POSTGRES_PASSWORD_SOURCE_FILE:-./docker/secrets/dev/airflow_postgres_password.txt}
  airflow_api_secret_key:
    file: ${AIRFLOW_API_SECRET_KEY_SOURCE_FILE:-./docker/secrets/dev/airflow_api_secret_key.txt}
  redshift_password:
    file: ${REDSHIFT_PASSWORD_SOURCE_FILE:-./docker/secrets/dev/redshift_password.txt}
  oltp_admin_password:
    file: ${OLTP_ADMIN_PASSWORD_SOURCE_FILE:-./docker/secrets/dev/postgres_password.txt}
  oltp_simulator_password:
    file: ${OLTP_SIMULATOR_PASSWORD_SOURCE_FILE:-./docker/secrets/dev/postgres_password.txt}
  oltp_cdc_reader_password:
    file: ${OLTP_CDC_READER_PASSWORD_SOURCE_FILE:-./docker/secrets/dev/postgres_password.txt}
