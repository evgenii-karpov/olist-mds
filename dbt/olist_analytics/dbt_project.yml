name: "olist_analytics"
version: "1.0.0"
config-version: 2

profile: "olist_analytics"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  batch_date: "2018-09-01"
  cdc_transform_run_id: ""
  realtime_publication_enabled: false

models:
  olist_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    core:
      +materialized: table
      +schema: core
    marts:
      +materialized: table
      +schema: marts
    realtime:
      staging:
        +materialized: view
        +schema: realtime_staging
      core:
        +materialized: table
        +schema: realtime_core
      marts:
        +materialized: incremental
        +schema: realtime_marts
  elementary:
    +schema: elementary

snapshots:
  olist_analytics:
    +target_schema: snapshots
