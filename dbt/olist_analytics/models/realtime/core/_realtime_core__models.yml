version: 2

models:
  - name: hist_cdc__customers
    description: Complete source-ordered customer event history; delete events remain visible.
  - name: hist_cdc__orders
    description: Complete source-ordered order event history with explicit delete state.
  - name: hist_cdc__order_items
    description: Complete source-ordered order-item event history at composite-key grain.
  - name: hist_cdc__order_payments
    description: Complete source-ordered payment event history.
  - name: hist_cdc__order_reviews
    description: Complete source-ordered review event history.
  - name: hist_cdc__products
    description: Complete source-ordered product event history.
  - name: hist_cdc__sellers
    description: Complete source-ordered seller event history.
  - name: hist_cdc__product_category_translation
    description: Complete source-ordered category translation event history.
  - name: dim_customer_realtime_scd2
    description: Event-derived customer history at customer_unique_id grain; processing time never defines validity.
    columns:
      - name: customer_key
        data_tests: [not_null, unique]
      - name: customer_unique_id
        data_tests: [not_null]
  - name: dim_product_realtime_scd2
    description: Event-derived product history with category translation and retained delete versions.
    columns:
      - name: product_key
        data_tests: [not_null, unique]
      - name: product_id
        data_tests: [not_null]
  - name: dim_seller_realtime
    description: Current Type 1 seller dimension sourced only from non-deleted CDC state.
    columns:
      - name: seller_id
        data_tests: [not_null, unique]
  - name: fact_order_items_realtime
    description: Incremental current item fact; impacted orders are deleted then rebuilt on each manifest micro-batch.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns: [order_id, order_item_id]
    columns:
      - name: order_item_key
        data_tests: [not_null, unique]
      - name: price
        data_tests: [not_null, non_negative]
      - name: freight_value
        data_tests: [not_null, non_negative]

unit_tests:
  - name: product_translation_respects_latest_product_state
    model: dim_product_realtime_scd2
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_cdc__products_events')
        rows:
          - {product_id: p1, product_category_name: a, _event_id: product-a, _op: c, _source_ts: '2026-07-16 10:00:00+00', _source_lsn: 10, _tx_order: 1, _partition: 0, _offset: 1}
          - {product_id: p1, product_category_name: b, _event_id: product-b, _op: u, _source_ts: '2026-07-16 10:00:01+00', _source_lsn: 20, _tx_order: 1, _partition: 0, _offset: 2}
          - {product_id: p1, product_category_name: b, _event_id: product-delete, _op: d, _source_ts: '2026-07-16 10:00:03+00', _source_lsn: 40, _tx_order: 1, _partition: 0, _offset: 4}
      - input: ref('stg_cdc__product_category_translation_events')
        rows:
          - {product_category_name: a, product_category_name_english: old-a, _event_id: translation-a, _op: u, _source_ts: '2026-07-16 10:00:02+00', _source_lsn: 30, _tx_order: 1, _partition: 0, _offset: 3}
          - {product_category_name: b, product_category_name_english: late-b, _event_id: translation-b, _op: u, _source_ts: '2026-07-16 10:00:04+00', _source_lsn: 50, _tx_order: 1, _partition: 0, _offset: 5}
    expect:
      rows:
        - {product_id: p1, product_category_name: a, product_category_name_english: null, _offset: 1, is_current: false, is_deleted: false}
        - {product_id: p1, product_category_name: b, product_category_name_english: null, _offset: 2, is_current: false, is_deleted: false}
        - {product_id: p1, product_category_name: b, product_category_name_english: null, _offset: 4, is_current: true, is_deleted: true}

  - name: history_keeps_multiple_updates_and_delete_in_source_order
    model: hist_cdc__customers
    given:
      - input: ref('stg_cdc__customers_events')
        rows:
          - {customer_id: c1, customer_city: a, _op: c, _source_ts: '2026-07-16 10:00:00+00', _source_lsn: 10, _tx_order: 1, _partition: 0, _offset: 1}
          - {customer_id: c1, customer_city: b, _op: u, _source_ts: '2026-07-16 10:00:01+00', _source_lsn: 11, _tx_order: 2, _partition: 0, _offset: 2}
          - {customer_id: c1, customer_city: c, _op: u, _source_ts: '2026-07-16 10:00:01+00', _source_lsn: 11, _tx_order: 3, _partition: 0, _offset: 3}
          - {customer_id: c1, customer_city: c, _op: d, _source_ts: '2026-07-16 10:00:02+00', _source_lsn: 12, _tx_order: 4, _partition: 0, _offset: 4}
    expect:
      rows:
        - {customer_id: c1, customer_city: a, _op: c, _offset: 1, is_current: false, is_deleted: false}
        - {customer_id: c1, customer_city: b, _op: u, _offset: 2, is_current: false, is_deleted: false}
        - {customer_id: c1, customer_city: c, _op: u, _offset: 3, is_current: false, is_deleted: false}
        - {customer_id: c1, customer_city: c, _op: d, _offset: 4, is_current: true, is_deleted: true}
