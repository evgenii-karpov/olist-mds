version: 2

sources:
  - name: olist
    description: >
      Raw Olist source tables loaded into the active warehouse target.
    schema: raw_data
    config:
      loaded_at_field: _loaded_at
      freshness:
        warn_after:
          count: 2
          period: day
        error_after:
          count: 7
          period: day
    tables:
      - name: customers
        description: Customer profile records from Olist.
        columns:
          - name: customer_id
            data_tests:
              - not_null
          - name: customer_unique_id
            data_tests:
              - not_null
      - name: geolocation
        description: Zip-code level latitude and longitude records.
        columns:
          - name: geolocation_zip_code_prefix
            data_tests:
              - not_null
      - name: order_items
        description: >
          Order item lines with product, seller, price, and freight values.
        columns:
          - name: order_id
            data_tests:
              - not_null
          - name: order_item_id
            data_tests:
              - not_null
          - name: product_id
            data_tests:
              - not_null
          - name: seller_id
            data_tests:
              - not_null
      - name: order_payments
        description: Payments captured at order grain.
        columns:
          - name: order_id
            data_tests:
              - not_null
          - name: payment_sequential
            data_tests:
              - not_null
      - name: order_reviews
        description: Customer reviews at order grain.
        columns:
          - name: review_id
            data_tests:
              - not_null
          - name: order_id
            data_tests:
              - not_null
      - name: orders
        description: Olist order headers and lifecycle timestamps.
        columns:
          - name: order_id
            data_tests:
              - not_null
          - name: customer_id
            data_tests:
              - not_null
      - name: products
        description: Product catalog attributes.
        columns:
          - name: product_id
            data_tests:
              - not_null
      - name: sellers
        description: Seller profile records.
        columns:
          - name: seller_id
            data_tests:
              - not_null
      - name: product_category_translation
        description: Portuguese to English product category mapping.
        columns:
          - name: product_category_name
            data_tests:
              - not_null
      - name: customer_profile_changes
        description: Generated customer profile corrections for SCD2 simulation.
        columns:
          - name: customer_unique_id
            data_tests:
              - not_null
          - name: effective_at
            data_tests:
              - not_null
      - name: product_attribute_changes
        description: >
          Generated product attribute corrections for SCD2 simulation.
        columns:
          - name: product_id
            data_tests:
              - not_null
          - name: effective_at
            data_tests:
              - not_null
