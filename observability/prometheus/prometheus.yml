global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: connect
    static_configs:
      - targets: ["cdc-component-exporter:9106"]

  - job_name: oltp-postgres
    static_configs:
      - targets: ["postgres-exporter-oltp:9187"]

  - job_name: nifi
    static_configs:
      - targets: ["nifi-metrics-proxy:9105"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

